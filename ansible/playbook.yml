---
- name: Deploy node on DigitalOcean Droplet
  hosts: all
  become: yes
  vars:
    app_dir: /home/deploy/app
    node_version: "20"
    db_type: postgres

  pre_tasks:
    - name: "Wait for SSH to become available"
      wait_for_connection:
        timeout: 120
        sleep: 5

    - name: "Gather facts"
      gather_facts: yes

    - name: "Update apt cache"
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: "Install required system packages"
      apt:
        name:
          - curl
          - git
          - nginx
          - postgresql-client
          - build-essential
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

  tasks:
    - name: "Create deploy user"
      user:
        name: deploy
        shell: /bin/bash
        create_home: yes
        state: present

    - name: "Add deploy user to sudo group"
      user:
        name: deploy
        groups: sudo
        append: yes

    - name: "Allow deploy user passwordless sudo"
      copy:
        content: "deploy ALL=(ALL) NOPASSWD:ALL\n"
        dest: /etc/sudoers.d/deploy
        mode: "0440"

    - name: "Create .ssh directory for deploy user"
      file:
        path: /home/deploy/.ssh
        state: directory
        owner: deploy
        group: deploy
        mode: "0700"

    - name: "Copy authorized_keys to deploy user"
      copy:
        src: /root/.ssh/authorized_keys
        dest: /home/deploy/.ssh/authorized_keys
        remote_src: yes
        owner: deploy
        group: deploy
        mode: "0600"

    - name: "Add NodeSource GPG key"
      shell: |
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
          | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
      args:
        creates: /usr/share/keyrings/nodesource.gpg

    - name: "Add NodeSource repository for Node.js 20"
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main"
        state: present
        filename: nodesource

    - name: "Install Node.js 20"
      apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: "Install PM2 globally"
      npm:
        name: pm2
        global: yes
        state: present

    - name: "Create app directory"
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: deploy
        group: deploy
        mode: "0755"

    - name: "Copy application files to droplet"
      synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ app_dir }}/"
        delete: yes
        recursive: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=.env"
          - "--exclude=terraform"
          - "--exclude=ansible"
          - "--exclude=.terraform"
          - "--exclude=*.tfstate"
          - "--exclude=*.tfstate.backup"

    - name: "Set app directory ownership"
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: deploy
        group: deploy
        recurse: yes

    - name: "Write .env file"
      shell: |
        printf 'NODE_ENV=production\n' > {{ app_dir }}/.env
        printf 'PORT=3000\n' >> {{ app_dir }}/.env
        printf 'DB_HOST=%s\n' "{{ lookup('env', 'DB_HOST') }}" >> {{ app_dir }}/.env
        printf 'DB_PORT=%s\n' "{{ lookup('env', 'DB_PORT') | default('5432') }}" >> {{ app_dir }}/.env
        printf 'DB_NAME=%s\n' "{{ lookup('env', 'DB_NAME') }}" >> {{ app_dir }}/.env
        printf 'DB_USER=%s\n' "{{ lookup('env', 'DB_USER') }}" >> {{ app_dir }}/.env
        printf 'DB_PASSWORD=%s\n' "{{ lookup('env', 'DB_PASSWORD') }}" >> {{ app_dir }}/.env
        printf 'DATABASE_URL=%s\n' "{{ lookup('env', 'DATABASE_URL') }}" >> {{ app_dir }}/.env
      args:
        executable: /bin/bash
      become_user: deploy

    - name: "Set .env file permissions"
      file:
        path: "{{ app_dir }}/.env"
        owner: deploy
        group: deploy
        mode: "0600"

    - name: "Check for package.json build script"
      shell: |
        node -e "
          const pkg = require('{{ app_dir }}/package.json');
          process.exit(pkg.scripts && pkg.scripts.build ? 0 : 1);
        "
      args:
        executable: /bin/bash
      register: has_build_script
      failed_when: false
      changed_when: false

    - name: "Install npm dependencies"
      shell: |
        cd {{ app_dir }} && npm install --production=false
      args:
        executable: /bin/bash
      become_user: deploy

    - name: "Run npm build if build script exists"
      shell: |
        cd {{ app_dir }} && npm run build
      args:
        executable: /bin/bash
      become_user: deploy
      when: has_build_script.rc == 0

    - name: "Delete existing PM2 app if running"
      shell: |
        pm2 delete app 2>/dev/null || true
      args:
        executable: /bin/bash
      become_user: deploy

    - name: "Start application with PM2 using npm start"
      shell: |
        cd {{ app_dir }} && pm2 start npm --name app -- start --update-env
      args:
        executable: /bin/bash
      become_user: deploy

    - name: "Save PM2 process list"
      shell: |
        pm2 save
      args:
        executable: /bin/bash
      become_user: deploy

    - name: "Configure PM2 to start on system boot"
      shell: |
        pm2 startup systemd -u deploy --hp /home/deploy | tail -1 | bash
      args:
        executable: /bin/bash

    - name: "Wait for application to be healthy"
      wait_for:
        host: 127.0.0.1
        port: 3000
        timeout: 60
        delay: 5
      ignore_errors: yes
      register: app_health

    - name: "Dump PM2 logs if app did not start"
      shell: |
        pm2 logs app --lines 50 --nostream
      args:
        executable: /bin/bash
      become_user: deploy
      when: app_health.failed is defined and app_health.failed

    - name: "Fail if application is not healthy"
      fail:
        msg: "Application failed to start on port 3000. Check PM2 logs above."
      when: app_health.failed is defined and app_health.failed

    - name: "Configure Nginx reverse proxy"
      copy:
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 300;
                  proxy_connect_timeout 300;
              }
          }
        dest: /etc/nginx/sites-available/default
        mode: "0644"

    - name: "Ensure Nginx sites-enabled default exists"
      file:
        src: /etc/nginx/sites-available/default
        dest: /etc/nginx/sites-enabled/default
        state: link

    - name: "Test Nginx configuration"
      command: nginx -t
      changed_when: false

    - name: "Restart Nginx"
      systemd:
        name: nginx
        state: restarted
        enabled: yes

    - name: "Verify application health via HTTP"
      uri:
        url: "http://localhost:3000/health"
        method: GET
        status_code: 200
        timeout: 30
      register: health_check
      retries: 5
      delay: 5
      until: health_check.status == 200
      ignore_errors: yes

    - name: "Report deployment status"
      debug:
        msg: "Deployment complete. Application is running at http://{{ ansible_host }}:80 (proxied from port 3000)"